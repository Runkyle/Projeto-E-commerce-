<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SitaxWare - Tenis e Sneakers online</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/products.css">
    <link rel="stylesheet" href="./css/products-grid.css">

    <meta name="description" content="Compre os melhores tênis e sneakers online na SyntaxWear">


</head>

<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SintaxWare - Tenis e Sneakers online">
                <img src="./img/logo/logo.svg" alt="SintaxWare - Tenis e Sneakers online">
            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu secundário">
            <ul>
                <li>
                    <a href="#">Nossas lojas</a>
                </li>

                <li>
                    <a href="#">Sobre</a>
                </li>

                <li>
                    <a href="#" aria-label="Minha conta">
                        <img src="./icons/Vector.svg" alt="conta">
                    </a>
                </li>

                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./icons/help.svg" alt="help">
                    </a>
                </li>

                <li>
                    <a href="#" aria-label="Carrinho">
                        <img src="./icons/bag.svg" alt="bag">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">

            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos<a>
                                <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>

        </section>

        <section class="categories-section">

            <!-- Navegação rápida por categorias de produtos -->
            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Casual</span>
                </a>
            </div>

            <div class="category-card esportivo">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Espoerte</span>
                </a>
            </div>

            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>

            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>
            </div>

        </section>

        <section class="grid-section">
            <div class="card highlight ">
                <div class="highlight-content">
                    <h2 class="card-title">Krypton One</h2>
                    <p class="card-subtitle">Estilo urbano com atitude</p>
                    <div class="ctp-group">
                        <a href="#" class="btn btn-outline">Feminino</a>
                    <a href="#" class="btn btn-outline">Masculino</a>
                    </div>
                </div>
            </div>
            <div class="card sneaker-purple "></div>
            <div class="card model "></div>
            <div class="card sneaker-color"></div>
            <div class="card sneaker-white"></div>
            <div class="card sneaker-silver"></div>
        </section>

        
    </main>

    <footer>
        <div class="container">
            <!-- Footer content -->
        </div>
    </footer>

</body>

</html>
